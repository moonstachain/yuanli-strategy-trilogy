<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="算力活与原力活两堆">
<style>
.ln{fill:none;stroke:#c9a961;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.thin{fill:none;stroke:#c9a961;stroke-width:1;stroke-linecap:round;opacity:.55}
.faint{fill:none;stroke:#9bae9a;stroke-width:1.1;stroke-linejoin:round;opacity:.34}
.faintl{stroke:#9bae9a;stroke-width:1;opacity:.3}
.accent{fill:none;stroke:#a8362c;stroke-width:1.9;stroke-linejoin:round}
.glow{fill:#a8362c;opacity:.1}
.lbl{fill:#c9a961;font-family:"Noto Serif SC",serif;opacity:.9}
.lbl-a{fill:#c06a5e;font-family:"Noto Serif SC",serif}
.lbl-s{fill:#9bae9a;font-family:"Noto Serif SC",serif;opacity:.65}
</style>
<!-- center divider -->
<line x1="300" y1="56" x2="300" y2="312" class="thin" stroke-dasharray="3 6"/>
<!-- LEFT: 算力活 (dense, faded, many) -->
<text x="150" y="44" text-anchor="middle" class="lbl-s" font-size="15">算力活</text>
<text x="150" y="62" text-anchor="middle" class="lbl-s" font-size="11">机器分分钟干完</text>
<g class="faint">
<rect x="46" y="92" width="40" height="26" rx="2"/><rect x="92" y="100" width="40" height="26" rx="2"/>
<rect x="64" y="128" width="40" height="26" rx="2"/><rect x="112" y="134" width="40" height="26" rx="2"/>
<rect x="44" y="166" width="40" height="26" rx="2"/><rect x="96" y="172" width="40" height="26" rx="2"/>
<rect x="70" y="204" width="40" height="26" rx="2"/><rect x="120" y="210" width="40" height="26" rx="2"/>
<rect x="52" y="242" width="40" height="26" rx="2"/><rect x="104" y="248" width="40" height="26" rx="2"/>
</g>
<g class="faintl">
<line x1="52" y1="101" x2="80" y2="101"/><line x1="98" y1="109" x2="126" y2="109"/>
<line x1="70" y1="137" x2="98" y2="137"/><line x1="50" y1="175" x2="78" y2="175"/>
<line x1="76" y1="213" x2="104" y2="213"/><line x1="58" y1="251" x2="86" y2="251"/>
</g>
<!-- RIGHT: 原力活 (sparse, bright, one accent) -->
<text x="450" y="44" text-anchor="middle" class="lbl-a" font-size="15">原力活</text>
<text x="450" y="62" text-anchor="middle" class="lbl-s" font-size="11">只有你能干</text>
<rect x="372" y="104" width="58" height="38" rx="3" class="ln"/>
<line x1="384" y1="118" x2="418" y2="118" class="thin"/><line x1="384" y1="128" x2="408" y2="128" class="thin"/>
<rect x="450" y="232" width="58" height="38" rx="3" class="ln"/>
<line x1="462" y1="246" x2="496" y2="246" class="thin"/><line x1="462" y1="256" x2="484" y2="256" class="thin"/>
<!-- the one that glows: accent -->
<rect x="408" y="168" width="62" height="42" rx="3" class="glow"/>
<rect x="408" y="168" width="62" height="42" rx="3" class="accent"/>
<path class="accent" stroke-width="1.4" d="M439,180 L439,198 M430,189 L448,189 M433,183 L445,195 M445,183 L433,195"/>
<!-- tiny figure sorting at the divider -->
<g class="ln" stroke-width="1.3">
<circle cx="300" cy="296" r="5"/>
<path d="M300,301 L300,322"/>
<path d="M300,306 L286,300 M300,306 L314,300"/>
<path d="M300,322 L292,336 M300,322 L308,336"/>
</g>
</svg>
