<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="冰山潜水者">
<style>
.ln{fill:none;stroke:#c9a961;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.thin{fill:none;stroke:#c9a961;stroke-width:1;stroke-linecap:round;opacity:.5}
.accent{fill:none;stroke:#a8362c;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.accent-f{fill:#a8362c;stroke:none}
.berg{fill:#c9a961;opacity:.05}
.lbl{fill:#c9a961;font-family:"Noto Serif SC",serif;opacity:.8}
.lbl-s{fill:#9bae9a;font-family:"Noto Serif SC",serif;opacity:.65}
</style>
<!-- waterline -->
<path class="thin" d="M24,150 Q70,144 116,150 T208,150 T300,150 T392,150 T484,150 T576,150"/>
<text x="30" y="142" class="lbl-s" font-size="11">水面</text>
<!-- iceberg tip above water -->
<path class="ln" d="M250,150 L276,104 L294,128 L312,150 Z"/>
<!-- tiny figure polishing the tip -->
<g class="ln" stroke-width="1.3">
<circle cx="282" cy="96" r="3.4"/>
<path d="M282,99 Q285,106 291,107"/>
<path d="M291,107 L299,110"/>
<path d="M282,107 L279,114 M282,107 L285,114"/>
</g>
<path class="thin" d="M300,112 q4,-1 7,1"/>
<text x="318" y="100" class="lbl-s" font-size="11.5">你擦的那一角</text>
<!-- iceberg body below water (the 90%) -->
<path class="berg" d="M214,151 L360,151 C404,200 396,278 336,320 C296,346 244,344 210,312 C166,266 172,196 214,151 Z"/>
<path class="ln" d="M214,151 C172,196 166,266 210,312 C244,344 296,346 336,320 C396,278 404,200 360,151"/>
<path class="thin" d="M256,168 L236,250 L286,308"/>
<path class="thin" d="M322,176 L342,262"/>
<path class="thin" d="M236,250 L322,238"/>
<text x="232" y="244" class="lbl" font-size="26" font-weight="600">90%</text>
<text x="232" y="266" class="lbl-s" font-size="12.5">机器永远够不着</text>
<!-- diver descending, head-down (accent) -->
<g class="accent">
<circle cx="452" cy="196" r="4.2" class="accent-f"/>
<path d="M452,192 L455,160"/>
<path d="M452,191 Q444,198 439,205 M452,191 Q460,198 466,205"/>
<path d="M455,160 Q450,150 445,144 M455,160 Q460,150 466,145"/>
</g>
<!-- bubbles rising -->
<circle cx="466" cy="178" r="2.1" class="thin" fill="none"/>
<circle cx="473" cy="162" r="1.6" class="thin" fill="none"/>
<circle cx="478" cy="149" r="1.1" class="thin" fill="none"/>
<!-- entry splash -->
<path class="accent" stroke-width="1.2" d="M449,150 l-4,-7 M457,150 l3,-7 M453,150 l0,-8"/>
</svg>
