<svg viewBox="0 0 460 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="原力三圈交集">
<style>
.ln{fill:none;stroke:#c9a961;stroke-width:1.6;stroke-linejoin:round}
.fillc{fill:#c9a961;opacity:.045}
.accent{fill:none;stroke:#a8362c;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.glow{fill:#a8362c;opacity:.1}
.lbl{fill:#c9a961;font-family:"Noto Serif SC",serif;opacity:.9}
.lbl-a{fill:#c06a5e;font-family:"Noto Serif SC",serif;font-style:italic;opacity:.85}
.core{fill:#f4e4b8;font-family:"Noto Serif SC",serif;font-weight:600}
</style>
<!-- three circles -->
<circle cx="230" cy="168" r="115" class="fillc"/>
<circle cx="168" cy="272" r="115" class="fillc"/>
<circle cx="292" cy="272" r="115" class="fillc"/>
<circle cx="230" cy="168" r="115" class="ln"/>
<circle cx="168" cy="272" r="115" class="ln"/>
<circle cx="292" cy="272" r="115" class="ln"/>
<!-- circle names -->
<text x="230" y="40" text-anchor="middle" class="lbl" font-size="16">非理性痴迷</text>
<text x="230" y="58" text-anchor="middle" class="lbl" font-size="11" opacity=".6">不给钱也做</text>
<text x="44" y="350" class="lbl" font-size="16">非对称优势</text>
<text x="44" y="368" class="lbl" font-size="11" opacity=".6">别人学不来</text>
<text x="330" y="350" class="lbl" font-size="16">非线性回报</text>
<text x="330" y="368" class="lbl" font-size="11" opacity=".6">扩百倍不累</text>
<!-- trap regions (only two of three) -->
<text x="230" y="120" text-anchor="middle" class="lbl-a" font-size="13">民科</text>
<text x="120" y="300" text-anchor="middle" class="lbl-a" font-size="13">打工</text>
<text x="168" y="212" text-anchor="middle" class="lbl-a" font-size="13">手艺人</text>
<!-- core: 原力 -->
<circle cx="230" cy="236" r="30" class="glow"/>
<g class="accent">
<path d="M230,212 L230,260 M208,236 L252,236 M215,221 L245,251 M245,221 L215,251"/>
</g>
<text x="230" y="304" text-anchor="middle" class="core" font-size="17">原力</text>
</svg>
