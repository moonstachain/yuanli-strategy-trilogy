<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="闭环四段式">
<style>
.ln{fill:none;stroke:#c9a961;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.thin{fill:none;stroke:#c9a961;stroke-width:1;opacity:.5;stroke-linecap:round}
.accent{fill:none;stroke:#a8362c;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.accent-f{fill:#a8362c;stroke:none}
.lbl{fill:#c9a961;font-family:"Noto Serif SC",serif;opacity:.9}
.lbl-a{fill:#c06a5e;font-family:"Noto Serif SC",serif}
.lbl-s{fill:#9bae9a;font-family:"Noto Serif SC",serif;opacity:.65}
</style>
<!-- the ring: 4 arc segments, clockwise from top -->
<path class="ln" d="M300 78 A102 102 0 0 1 402 180"/>
<path class="ln" d="M402 180 A102 102 0 0 1 300 282"/>
<path class="ln" d="M300 282 A102 102 0 0 1 198 180"/>
<path class="accent" d="M198 180 A102 102 0 0 1 300 78"/>
<!-- arrowheads clockwise -->
<path class="accent-f" d="M402 180 l-9 -5 l3 10 z"/>
<path class="thin" d="M300 282 l5 -9 M300 282 l-5 -9" stroke="#c9a961" opacity=".9"/>
<path class="thin" d="M198 180 l9 5 M198 180 l9 -5" stroke="#c9a961" opacity=".9"/>
<path class="accent" d="M300 78 l-5 9 M300 78 l5 9"/>
<!-- segment labels -->
<text x="372" y="120" class="lbl" font-size="14.5">连续表达</text>
<text x="372" y="244" class="lbl" font-size="14.5">收束</text>
<text x="252" y="312" class="lbl" font-size="14.5">推进</text>
<text x="150" y="120" text-anchor="end" class="lbl-a" font-size="14.5">明确结果态</text>
<text x="150" y="138" text-anchor="end" class="lbl-s" font-size="11">「我讲完了」</text>
<!-- center: 收口 close mark -->
<circle cx="300" cy="180" r="22" class="thin"/>
<path class="accent" d="M291 180 l6 7 l12 -15"/>
<text x="300" y="218" text-anchor="middle" class="lbl-s" font-size="11">干净收口</text>
<!-- next-round hint at the closing seam (top) -->
<text x="300" y="62" text-anchor="middle" class="lbl-s" font-size="10.5">↻ 收完即下一圈</text>
</svg>
