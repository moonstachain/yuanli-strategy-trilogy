<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="真齿假齿·最小真实">
<style>
.ln{fill:none;stroke:#c9a961;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.thin{fill:none;stroke:#c9a961;stroke-width:1;opacity:.5;stroke-linecap:round}
.faint{fill:none;stroke:#9bae9a;stroke-width:1.4;opacity:.4;stroke-linecap:round}
.faintt{stroke:#9bae9a;stroke-width:6;stroke-dasharray:5 7;opacity:.32;fill:none}
.accent{fill:none;stroke:#a8362c;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.accentt{stroke:#a8362c;stroke-width:7;stroke-dasharray:5 7;opacity:.8;fill:none}
.accent-f{fill:#a8362c;stroke:none}
.teeth{fill:none;stroke:#c9a961;stroke-width:8;stroke-dasharray:7 9;opacity:.8}
.lbl{fill:#c9a961;font-family:"Noto Serif SC",serif;font-size:13.5px;opacity:.9}
.lbl-a{fill:#c06a5e;font-family:"Noto Serif SC",serif;font-size:13.5px}
.lbl-s{fill:#9bae9a;font-family:"Noto Serif SC",serif;font-size:11px;opacity:.65}
.mono{font-family:"JetBrains Mono",monospace;font-size:13px}
</style>
<!-- LEFT: fake tooth, idle spin, not engaging -->
<circle cx="118" cy="140" r="40" class="faintt"/>
<circle cx="118" cy="140" r="28" class="faint"/>
<circle cx="118" cy="140" r="3" fill="#9bae9a" opacity=".4"/>
<path class="faint" d="M150 110 a40 40 0 0 1 6 22"/>
<path class="faint" d="M156 132 l-6 1 l1 -7"/>
<text x="118" y="206" text-anchor="middle" class="lbl-s" font-size="13">假齿 · mock/demo</text>
<text x="118" y="225" text-anchor="middle" class="lbl-s">空转·不咬任何东西</text>
<text x="118" y="252" text-anchor="middle" class="mono" fill="#9bae9a" opacity=".55">×1000 = 0</text>
<!-- RIGHT: real tooth meshing into flywheel -->
<!-- flywheel rim arc -->
<path class="teeth" d="M520 60 A100 100 0 0 1 520 260"/>
<path class="ln" d="M508 78 A82 82 0 0 1 508 242"/>
<text x="548" y="166" class="lbl-s">代谢飞轮</text>
<!-- real tooth (cinnabar) meshing -->
<circle cx="372" cy="160" r="40" class="accentt"/>
<circle cx="372" cy="160" r="28" class="accent"/>
<circle cx="372" cy="160" r="3" class="accent-f"/>
<!-- mesh contact -->
<path class="thin" d="M412 160 L426 160" stroke="#a8362c" opacity=".7"/>
<text x="372" y="226" text-anchor="middle" class="lbl-a" font-size="13">真齿 · 真客户真钱真反馈</text>
<text x="372" y="245" text-anchor="middle" class="lbl-s">咬得起飞轮</text>
<text x="372" y="272" text-anchor="middle" class="mono" fill="#c06a5e">×1 = 1，开始复利</text>
<!-- vs divider -->
<text x="245" y="150" text-anchor="middle" class="lbl-s" font-size="14">vs</text>
<text x="300" y="36" text-anchor="middle" class="lbl">「最小」＝最小的真实，不是小一点的假的</text>
</svg>
